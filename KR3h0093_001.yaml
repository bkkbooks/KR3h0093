body:
  text: 筆陳圖一卷夫三端之妙莫先乎用筆六藝之奧莫匪乎銀鉤昔秦丞相斯見周穆王書七日興歎患其無骨蔡尚書雍入鴻都觀碣十旬不返嗟其出群故知達其源者少暗於其理者多近代以來殊不師古而緣情棄道才記姓名或學不該贍聞見又寡致使成功不就虛費精神自非通靈感物不可與談斯道今刪李斯筆妙更加潤色總七條并作其形容列事如左貽諸子孫永為模範庶將來君子時復覽焉筆要取崇山絶仞中兔毛八九月收之其筆頭長一寸管長五寸鋒齊腰強者其硯取前涸新石潤澀相兼浮津耀墨者其墨取廬山之松煙代郡之鹿膠十年以上強如石者為之𥿄取東陽魚卯虛柔滑淨者先學書字先學執筆若真書去筆頭二寸一分若行草書去筆頭二寸一分執之下筆點黑畫芟波屈曲皆須盡一身之力而送之若初學先大書不得從小善鑒者不寫善寫者不鑒善筆力者多骨不善筆力者多肉多骨微肉者謂之筯書多肉微骨者謂之墨豬多力豐筯者聖無力無筯者病一二從其消息而用之一如千里陳雲隱隱然其實有形丶如高峰墜石磕磕然實如崩也丿陸斷犀象隱百鈞弩發丨萬歲枯藤乀崩浪雷奔𠃌徑弩筯節右七條筆陳出入斬斫圖執筆有七種有心急而執筆緩者有心緩而執筆急者若執筆近而不能緊者心手不齊意後筆前者敗若執筆遠而急意前筆後者勝又有六種用筆結構圓備如篆法飄揚灑落如章草凶險可畏如八分窈窕出入如飛白耿介特立如鶴頭鬱拔縱橫如古隸然心存委曲每為一字各象其形斯造妙矣書道畢矣永和田年上虞製記夫紙者陳也筆者刀稍也墨者鍪甲也水硯者城池也心意者將軍也本領者副將也結搆者謀略也揚筆者吉凶也出入者號令也屈折者殺戮也夫欲書者先乾研墨凝神靜思預想字形大小仰平直振動令筯脈相連意在筆前然後作字若平直相似狀如算子上下方整前後齊平此不是書但得其點畫爾昔未翼常作此書翼是鍾繇弟子繇乃叱之翼三年不敢見繇即潛心改迹每作一波常三過折筆每作一點常隱鋒而為之每作一橫畫如列陳之排雲每作一戈如百鈞之弩發每作一點如高峰墜石屈折如鋼鉤每作一牽如萬歲枯藤每作一放縱如足行之趣驟翼先來書惡晉太康中有人於許下破鍾繇墓遂得筆勢論翼乃讀之依此法學名遂大振欲真書及行書皆依此法若欲學草書又有別法須緩前急後字體形勢狀等龍蛇相鉤連不斷仍須稜側起復用筆亦不得使齊平大小一等每作一字須有點處且作餘字總竟然後安點其點須空中遙擲筆作之其草書亦復須篆勢八分古隸相雜亦不得急令墨不入紙若急作意思淺薄而筆即直過惟有草及章程行狎等不用此勢但用擊石波而巳其擊石波者鈌波也又八分更有一波謂之隼尾波即鍾公泰山銘及魏文帝受禪碑中已有此體夫書先須引八分章草入隸字中發人意氣若直取俗字不能先發羲之少學衛夫人書將謂大能及渡江北遊名山比見李斯曹喜等書又之許下見鍾繇梁鵠書又之洛下見蔡雍石經三體書又於從兄洽處見張昶華嶽碑始知學衛夫人書徒費年月耳羲之遂改本師仍於衆碑學習焉遂成書爾時年五十有三或恐風燭奄及聊遺教於子孫耳可藏之石室千金勿傳
